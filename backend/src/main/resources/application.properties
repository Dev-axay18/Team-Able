# Application
spring.application.name=jeevanpath-backend
server.port=8080

# Database (H2 for dev, switch to MySQL for prod)
spring.datasource.url=jdbc:h2:mem:jeevanpathdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=jeevanpath-super-secret-key-for-jwt-token-signing-2024
jwt.expiration=86400000

# CORS
cors.allowed-origins=*

# Logging
logging.level.com.jeevanpath=DEBUG
logging.level.org.springframework.security=WARN
