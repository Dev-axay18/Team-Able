<!DOCTYPE html>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const db = supabase.createClient(
  'https://zkmawrdnmhdgmthxfmnl.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprbWF3cmRubWhkZ210aHhmbW5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjA4MTQsImV4cCI6MjA5MjYzNjgxNH0.ZsPqT6KOTigeXdA5xvTIFvltLEsgVDrMc8PMup2l3ak'
);

const out = document.getElementById('out');

async function runTests() {
  out.textContent = 'Running tests...\n\n';

  // Test 1: hospitals
  const t1 = await db.from('hospitals').select('id, name, total_beds, available_beds, icu_available, emergency_ready_ward').limit(5);

  out.textContent += 'error : ' + JSON.stringify(t2.error) + '\n';
  out.textContent += 'data  : ' + JSON.stringify(t2.data, null, 2) + '\n\n';

  // Test 3: users
  const t3 = await db.from('users').select('id, name, mobile_number, blood_type, gender, is_mobile_verified').limit(5);
  out.textContent += '=== USERS / PATIENTS ===\n';
  out.textContent += 'error : ' + JSON.stringify(t3.error) + '\n';
  out.textContent += 'data  : ' + JSON.stringify(t3.data, null, 2) + '\n\n';

  out.textContent += '=== DONE ===\n';
}

runTests();
</script>
